services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - zichan_data:/app
    environment:
      - PYTHONUNBUFFERED=1
    command: sh -c "python seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./zichan-manager-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  zichan_data:
